<!DOCTYPE html>
<html>
<head>
  <title>Instant Tutor</title>
</head>

<body>

<h2>Request a Tutor</h2>

<form id="tutorForm">

  <input type="text" id="studentId" placeholder="Student ID" required><br><br>

  <input type="text" id="subject" placeholder="Subject" required><br><br>

  <input type="text" id="topic" placeholder="Topic"><br><br>

  <select id="urgency">
    <option value="instant">Instant</option>
    <option value="scheduled">Scheduled</option>
  </select><br><br>

  <button type="submit">Find Tutor</button>

</form>

<p id="result"></p>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyTv3apH_rsBFonKKhneD1gE3KHUYxND9zpjrAUAnO56B6zeYp8an1qbXN0LEsvjuwo/exec";

document.getElementById("tutorForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const data = {
    studentId: document.getElementById("studentId").value,
    subject: document.getElementById("subject").value,
    topic: document.getElementById("topic").value,
    urgency: document.getElementById("urgency").value
  };

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.text())
  .then(response => {
    document.getElementById("result").innerText =
      "Request Created: " + response;
  });

});

</script>

</body>
</html>
